<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; font-family: 'Consolas', 'Courier New', monospace; background: #f5f0e3; color: #2d2d2d; }

    .header { padding: 12px 18px; background: #e0d8c0; border-bottom: 3px solid #4a4a4a; }
    .header h1 { font-family: 'Press Start 2P', monospace; font-size: 11px; color: #c0392b; letter-spacing: 1px; }
    .header p { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #888; margin-top: 4px; }

    .section { padding: 12px 18px; border-bottom: 2px solid #b0a890; }
    .section-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: #888; letter-spacing: 1px; margin-bottom: 8px; }

    .input-group { margin-bottom: 8px; }
    .input-group label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
    .input-group input, .input-group select {
      width: 100%; padding: 6px 10px; border-radius: 0;
      border: 2px solid #4a4a4a; background: #faf6ec; color: #2d2d2d;
      font-family: 'Consolas', monospace; font-size: 12px; outline: none;
    }
    .input-group input:focus, .input-group select:focus { border-color: #c0392b; }
    .input-group select option { background: #faf6ec; }

    .lang-row { display: flex; gap: 8px; align-items: flex-end; }
    .lang-row .input-group { flex: 1; margin-bottom: 0; }
    .lang-arrow { font-family: 'Press Start 2P', monospace; font-size: 12px; color: #c0392b; padding-bottom: 10px; flex-shrink: 0; }

    .btn {
      font-family: 'Press Start 2P', monospace;
      padding: 6px 14px; border: 2px solid #4a4a4a; border-radius: 0; cursor: pointer;
      font-size: 9px; box-shadow: 2px 2px 0 #4a4a4a; transition: none;
    }
    .btn:active { box-shadow: none; transform: translate(2px, 2px); }
    .btn-start { background: #fadbd8; color: #c0392b; border-color: #c0392b; box-shadow: 2px 2px 0 #c0392b; }
    .btn-start:hover { background: #f5b7b1; }
    .btn-start:disabled { background: #ddd; color: #aaa; border-color: #999; box-shadow: none; cursor: not-allowed; transform: none; }
    .btn-stop { background: #e8e0d0; color: #2d2d2d; }
    .btn-stop:hover { background: #d0c8b8; }
    .btn-stop:disabled { background: #ddd; color: #aaa; border-color: #999; box-shadow: none; cursor: not-allowed; transform: none; }
    .btn-test { background: #d5f5e3; color: #1e8449; border-color: #1e8449; box-shadow: 2px 2px 0 #1e8449; }
    .btn-test:hover { background: #abebc6; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px; padding: 6px 10px; border: 2px solid #4a4a4a;
      background: #faf6ec; font-size: 11px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 0; background: #ccc; flex-shrink: 0; border: 1px solid #4a4a4a; }
    .status-dot.active { background: #27ae60; animation: pulse 1s steps(1) infinite; }
    .status-dot.partial { background: #f39c12; animation: pulse 1s steps(1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .vosk-status { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .vosk-indicator {
      font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 3px 8px;
      border: 2px solid #4a4a4a;
    }
    .vosk-indicator.connected { background: #d5f5e3; color: #1e8449; border-color: #1e8449; }
    .vosk-indicator.disconnected { background: #fadbd8; color: #c0392b; border-color: #c0392b; }
    .vosk-indicator.loading { background: #fef9ef; color: #f39c12; border-color: #f39c12; }

    .visualizer { height: 50px; background: #faf6ec; border: 2px solid #4a4a4a; overflow: hidden; }
    .visualizer canvas { width: 100%; height: 100%; image-rendering: pixelated; }

    .level-meter { margin-top: 8px; }
    .level-bar-bg { height: 6px; background: #e8e0d0; border: 1px solid #4a4a4a; overflow: hidden; }
    .level-bar { height: 100%; width: 0%; background: #27ae60; transition: width 0.1s steps(3); }
    .level-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #aaa; margin-top: 3px; }

    .log-area { max-height: 80px; overflow-y: auto; }
    .log-item { font-size: 10px; padding: 3px 0; border-bottom: 1px dashed #b0a890; color: #888; }
    .log-item .time { color: #aaa; margin-right: 5px; }
    .log-item.success { color: #1e8449; }
    .log-item.error { color: #c0392b; }
    .log-item.info { color: #2980b9; }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #e8e0d0; }
    ::-webkit-scrollbar-thumb { background: #b0a890; border: 2px solid #e8e0d0; }
    ::-webkit-scrollbar-thumb:hover { background: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Language Agent</h1>
    <p>Vosk 本地流式语音识别 &middot; v0.6.0</p>
  </div>

  <div class="section">
    <div class="section-title">语言选择</div>
    <div class="lang-row">
      <div class="input-group">
        <label>识别语言 (源)</label>
        <select id="inputSourceLang">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="pt">Português</option>
          <option value="ru">Русский</option>
        </select>
      </div>
      <div class="lang-arrow">→</div>
      <div class="input-group">
        <label>翻译语言 (目标)</label>
        <select id="inputTargetLang">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Vosk 服务</div>
    <div class="input-group">
      <label>WebSocket 地址</label>
      <input type="text" id="inputVoskUrl" value="ws://localhost:2700" placeholder="ws://localhost:2700" />
    </div>
    <div class="btn-row">
      <button class="btn btn-test" id="btnTestVosk">测试连接</button>
    </div>
    <div class="vosk-status">
      <span class="vosk-indicator disconnected" id="voskIndicator">未连接</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">AI 翻译</div>
    <div class="input-group">
      <label>API Key</label>
      <input type="password" id="inputApiKey" placeholder="sk-..." />
    </div>
    <div class="input-group">
      <label>API Base URL</label>
      <input type="text" id="inputApiBaseUrl" value="https://api.deepseek.com/v1/chat/completions" />
    </div>
    <div class="input-group">
      <label>模型</label>
      <input type="text" id="inputApiModel" value="deepseek-chat" />
    </div>
    <div class="input-group" style="display:flex;align-items:center;gap:8px;margin-bottom:0;">
      <input type="checkbox" id="inputAiCorrection" style="width:auto;" />
      <label for="inputAiCorrection" style="margin:0;cursor:pointer;">AI 轻纠正 (修正常见识别错误)</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">学习网页</div>
    <div class="input-group">
      <label>网页地址</label>
      <input type="text" id="inputWebAppUrl" value="http://localhost:3000" placeholder="http://localhost:3000" />
    </div>
    <div class="input-group">
      <label>扩展 API Key (网页端生成)</label>
      <input type="text" id="inputExtApiKey" value="lang-agent-ext-key-2024" placeholder="la-ext-..." />
    </div>
    <div class="input-group">
      <label>用户 ID (网页端用户 ID)</label>
      <input type="number" id="inputExtUserId" value="1" placeholder="1" />
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="btnOpenWeb">打开网页</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">音频抓取 + 实时转写</div>
    <div class="btn-row">
      <button class="btn btn-start" id="btnStart">开始</button>
      <button class="btn btn-stop" id="btnStop" disabled>停止</button>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">未开始</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">音频电平</div>
    <div class="visualizer"><canvas id="visualizerCanvas"></canvas></div>
    <div class="level-meter">
      <div class="level-bar-bg"><div class="level-bar" id="levelBar"></div></div>
      <div class="level-label">RMS: <span id="rmsValue">0.000</span></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">日志</div>
    <div class="log-area" id="logArea"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
