server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/language_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: your-mysql-password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
  mail:
    host: smtp.example.com
    port: 587
    username: placeholder@example.com
    password: placeholder
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m

jwt:
  secret: Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3JldC1rZXktZm9yLXByb2R1Y3Rpb24tbGFuZ3VhZ2UtYWdlbnQ=
  expiration: 86400000

extension:
  api-key: lang-agent-ext-key-2024

deepseek:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: your-deepseek-api-key
  model: deepseek-chat

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
